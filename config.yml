# Configuration for the JAPredictBet MVP Pipeline

data:
  raw_path: "data/raw/dataset.csv"
  processed_path: "data/processed/processed_data.parquet"
  date_column: "date"

features:
  rolling_window: 10

model:
  objective: "count:poisson"
  random_state: 42
  ensemble_size: 50
  ensemble_seed_stride: 1

odds:
  provider_name: "data/raw/mock_odds.json"

value:
  threshold: 0.05
  consensus_threshold: 0.70
  run_consensus_sweep: true
  consensus_start: 0.35
  consensus_end: 1.00
  consensus_step: 0.05
