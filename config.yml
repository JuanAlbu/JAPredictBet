data:
  raw_path: "data/raw/dataset.csv"
  processed_path: "data/processed/processed_data.parquet"
  date_column: "date"

features:
  rolling_windows: [10, 5]
  rolling_use_std: true  # P1.B2: Include rolling standard deviation (consistency metric)
  rolling_use_ema: true  # P1.B2: Include EMA for recent form (time-decay)
  drop_redundant: true  # Drop wins/points (keep win_rate/points_per_game) + EMA window10 (keep window5)
  h2h_window: 3  # P1.B5: Head-to-head last N meetings

model:
  objective: "count:poisson"
  random_state: 42
  ensemble_size: 30 # 21 boosters (XGB/LGB) + 9 linear (Ridge/ElasticNet)
  algorithms: ["XGBoost", "LightGBM", "RandomForest", "Ridge", "ElasticNet"]
  ensemble_seed_stride: 1

odds:
  provider_name: "data/raw/mock_odds.json"
  match_similarity_threshold: 95.0
  ambiguity_margin: 1.0

value:
  threshold: 0.05 # Edge minimo para voto positivo
  consensus_threshold: 0.45 # Base para consenso (pode ser override via CLI)
  run_consensus_sweep: true
  consensus_start: 0.35
  consensus_end: 1.00
  consensus_step: 0.05
  # Dynamic margin rule: when |lambda - line| < tight_margin_threshold,
  # require tight_margin_consensus threshold for additional safety
  tight_margin_threshold: 0.5 # corners - margin considered "tight"
  tight_margin_consensus: 0.50 # 50% - consensus required when tight

# ── Gatekeeper Live Pipeline ──────────────────────────────────────────
gatekeeper:
  cron_trigger_minutes_before: 60  # T-60: coleta de contexto antes do jogo
  min_odd: 1.60                    # Odd mínima operacional (filtro Python hardcoded)
  max_entries_per_day: 5           # Máximo de entradas diárias
  shadow_log_path: "logs/shadow_bets.log"
  feature_store_path: "artifacts/feature_store.parquet"  # Built by: python scripts/refresh_features.py

api_keys:
  api_football_key: "${API_FOOTBALL_KEY}"  # Env var — NUNCA commitar chave real
  llm_api_key: "${LLM_API_KEY}"            # Env var — NUNCA commitar chave real

superbet_shadow:
  sse_endpoint: "https://production-superbet-offer-br.freetls.fastly.net/subscription/v2/pt-BR/events/all"
  sport_id: 5                               # Futebol
  corner_market_name: "Total de Escanteios"
  team_mapping_path: "data/mapping/superbet_teams.json"
  connect_timeout_s: 10.0
  read_timeout_s: 30.0
  stream_duration_s: 30.0
  max_retries: 3
  backoff_base_s: 2.0                       # Exponential backoff: 2, 4, 8 …
  # tournament_ids is derived automatically at runtime from the folders that
  # actually contain historical CSVs under data/raw/leagues/, using
  # data/mapping/league_tournament_ids.json.

api_football:
  base_url: "https://v3.football.api-sports.io"
  connect_timeout_s: 10.0
  read_timeout_s: 15.0
