data:
  raw_path: "data/raw/dataset.csv"
  processed_path: "data/processed/processed_data.parquet"
  date_column: "date"

features:
  rolling_windows: [10, 5]

model:
  objective: "count:poisson"
  random_state: 42
  ensemble_size: 30 # 21 boosters (XGB/LGB) + 9 linear (Ridge/ElasticNet)
  algorithms: ["XGBoost", "LightGBM", "RandomForest", "Ridge", "ElasticNet"]
  ensemble_seed_stride: 1

odds:
  provider_name: "data/raw/mock_odds.json"
  match_similarity_threshold: 95.0
  ambiguity_margin: 1.0

value:
  threshold: 0.05 # Edge minimo para voto positivo
  consensus_threshold: 0.45 # Base para consenso (pode ser override via CLI)
  run_consensus_sweep: true
  consensus_start: 0.35
  consensus_end: 1.00
  consensus_step: 0.05
  # Dynamic margin rule: when |lambda - line| < tight_margin_threshold,
  # require tight_margin_consensus threshold for additional safety
  tight_margin_threshold: 0.5 # corners - margin considered "tight"
  tight_margin_consensus: 0.50 # 50% - consensus required when tight
